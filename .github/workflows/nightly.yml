name: 416Homes Nightly Scraper

on:
  schedule:
    # Run every night at 2 AM EST (7 AM UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  # ── Step 1: Scrape listings (independent) ─────────────────────────────────
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: { python-version: '3.12' }
    - run: pip install -r requirements-full.txt && pip install playwright --upgrade
    - run: python -m playwright install --with-deps chromium
    - name: Run nightly scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        echo "Starting nightly scraper run..."
        python -m scraper.run_all --source all --area gta
        echo "Scraper run completed"

  # ── Step 2a: Train valuation model (runs in parallel with scrape) ──────────
  train-model:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: { python-version: '3.12' }
    - run: pip install -r requirements-full.txt
    - name: Train valuation model
      env:
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "Training valuation model..."
        python valuation/model.py
        echo "Model training completed"

  # ── Step 3: Agent loop (needs fresh listings from scrape) ─────────────────
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [scrape]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with: { python-version: '3.12' }
    - run: pip install -r requirements-railway.txt
    - name: Run agent matching loop
      env:
        PYTHONPATH: ${{ github.workspace }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
        LISTING_AGENT_EMAIL: ${{ secrets.LISTING_AGENT_EMAIL }}
      run: |
        echo "Running agent matching loop..."
        python agent/main.py
        echo "Agent loop completed"

  # ── Notifications: fire after all jobs complete ────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [scrape, train-model, agent]
    if: always()
    steps:
    - name: Create issue on critical failure
      if: ${{ needs.scrape.result == 'failure' || needs.agent.result == 'failure' }}
      uses: actions/github-script@v6
      with:
        script: |
          const issue = {
            title: '🚨 Critical Nightly Scraper Failure',
            body: `
              ## 416Homes Nightly Scraper Critical Failure
              
              **Workflow**: ${{ github.workflow }}
              **Run ID**: ${{ github.run_id }}
              **Time**: ${{ github.event.head_commit.timestamp }}
              **Repository**: ${{ github.repository }}
              
              ### What Happened
              The nightly scraper workflow has encountered a critical failure.
              
              ### Immediate Actions Required
              1. Review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              2. Check scraper performance and data quality
              3. Verify database connectivity
              4. Test individual components manually
              
              ### Investigation Checklist
              - [ ] Review error logs
              - [ ] Check database status
              - [ ] Verify API endpoints
              - [ ] Test individual scrapers
              - [ ] Check data quality metrics
              
              This issue was automatically created due to a critical failure in the production pipeline.
            `,
            labels: ['bug', 'critical', 'scrapers', 'nightly-failure']
          };
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ...issue
          });
        github-token: ${{ secrets.GITHUB_TOKEN }}
