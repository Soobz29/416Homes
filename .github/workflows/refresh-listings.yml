# Run scrapers on GitHub Actions every 3 hours and write to Supabase.
name: Refresh Listings (Run Scraper)

on:
  schedule:
    # Every 3 hours at :00 UTC (e.g. 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00)
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape-and-store:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-full.txt
          # Ensure playwright is installed regardless of scrapling/patchright conflicts
          pip install playwright --upgrade

      - name: Install Playwright browsers (Chromium only)
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scrapers and store to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # Keep embedding model stable; embedding failures are handled gracefully.
          GEMINI_EMBEDDING_MODEL: ${{ secrets.GEMINI_EMBEDDING_MODEL }}
        run: |
          python -m scraper.run_all --source all --area gta
