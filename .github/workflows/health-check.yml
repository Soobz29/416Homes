name: 416Homes Scraper Health Check

on:
  schedule:
    # Run health check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering the health check'
        required: false
        type: string

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run scraper health checks
      id: health-check
      run: |
        python scripts/health_check.py
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        AGENT_EMAIL: ${{ secrets.AGENT_EMAIL }}
        
    - name: Send email alert on failure
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚨 416Homes Scraper Health Check Failed"
        to: ${{ secrets.AGENT_EMAIL }}
        from: "416Homes Monitor <noreply@416homes.ca>"
        body: |
          The 416Homes scraper health check has failed.
          
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          Time: ${{ github.event.head_commit.timestamp }}
          
          Please check the GitHub Actions logs for details:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          This is an automated alert from the 416Homes monitoring system.
        
    - name: Create GitHub issue on critical failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const issue = {
            title: '🚨 Critical Scraper Health Check Failure',
            body: `
              ## 416Homes Scraper Health Check Failed
              
              **Workflow**: ${{ github.workflow }}
              **Run ID**: ${{ github.run_id }}
              **Time**: ${{ github.event.head_commit.timestamp }}
              **Repository**: ${{ github.repository }}
              
              ### What Happened
              The automated health check for the 416Homes scrapers has detected a critical failure.
              
              ### Next Steps
              1. Review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              2. Check scraper performance and selector issues
              3. Update CSS selectors if needed
              4. Test individual scrapers manually
              
              This issue was automatically created by the health monitoring system.
            `,
            labels: ['bug', 'critical', 'scrapers', 'health-check']
          };
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ...issue
          });
        github-token: ${{ secrets.GITHUB_TOKEN }}
