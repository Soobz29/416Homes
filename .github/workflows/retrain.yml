name: 416Homes Model Retraining

on:
  schedule:
    # Run every Sunday at 3 AM EST (8 AM UTC)
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering model retraining'
        required: false
        type: string

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Verify data availability
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "Checking data availability for retraining..."
        python -c "
        import os
        import asyncio
        from supabase import create_client
        
        client = create_client(os.environ.get('SUPABASE_URL'), os.environ.get('SUPABASE_KEY'))
        
        async def check_data():
            try:
                # Check sold comps
                sold_result = client.table('sold_comps').select('count', count='*').execute()
                sold_count = len(sold_result.data) if sold_result.data else 0
                print(f'Sold comps available: {sold_count}')
                
                # Check listings
                listings_result = client.table('listings').select('count', count='*').execute()
                listings_count = len(listings_result.data) if listings_result.data else 0
                print(f'Listings available: {listings_count}')
                
                if sold_count < 100:
                    print('WARNING: Insufficient sold comps for retraining')
                    exit(1)
                if listings_count < 50:
                    print('WARNING: Insufficient listings for retraining')
                    exit(1)
                    
                print('Data verification passed')
                exit(0)
                
            except Exception as e:
                print(f'Data verification failed: {e}')
                exit(1)
        
        asyncio.run(check_data())
        "
        
    - name: Fetch fresh sold comps
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "Fetching fresh sold comps for retraining..."
        python -m scraper.run_all --source housesigma --area gta --days-back 90
        echo "Sold comps fetch completed"
        
    - name: Train valuation model
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "Training LightGBM valuation model..."
        python valuation/model.py
        echo "Model training completed"
        
    - name: Evaluate model performance
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        echo "Evaluating model performance..."
        python -c "
        import sys, os, joblib
        import pandas as pd
        import numpy as np
        from sklearn.metrics import mean_absolute_percentage_error
        from supabase import create_client

        # Load trained model + encoders (same files saved by valuation/model.py)
        try:
            model = joblib.load('valuation_model.pkl')
            meta = joblib.load('valuation_model_encoders.pkl')
            encoders = meta.get('encoders', {})
            numeric_medians = meta.get('numeric_medians', {})
        except Exception as e:
            print(f'⚠️ Could not load model artefacts: {e}')
            sys.exit(0)

        # Fetch held-out sold comps from Supabase (most recent 200, unseen by training if using daily splits)
        client = create_client(os.environ.get('SUPABASE_URL'), os.environ.get('SUPABASE_KEY'))
        result = client.table('sold_comps').select('*').order('sold_date', desc=True).limit(200).execute()

        if not result.data or len(result.data) < 10:
            print('⚠️ Insufficient validation data — skipping MAPE check')
            sys.exit(0)

        df = pd.DataFrame(result.data)
        for col in ['price', 'bedrooms', 'bathrooms', 'sqft']:
            df[col] = pd.to_numeric(df[col], errors='coerce')
        df = df.dropna(subset=['price', 'bedrooms', 'bathrooms', 'sqft'])
        df = df[(df['price'] > 10000) & (df['sqft'] > 100) & (df['sqft'] < 10000)]
        df['price_per_sqft'] = df['price'] / df['sqft']
        df = df[(df['price_per_sqft'] > 50) & (df['price_per_sqft'] < 2000)]

        if len(df) < 10:
            print('⚠️ Too few clean rows for evaluation')
            sys.exit(0)

        # Encode categoricals using saved encoders
        for col, le in encoders.items():
            if col in df.columns:
                known = set(le.classes_)
                df[f'{col}_encoded'] = df[col].apply(lambda v: le.transform([v])[0] if v in known else 0)
            else:
                df[f'{col}_encoded'] = 0

        for col, median in numeric_medians.items():
            if col in df.columns:
                df[col] = df[col].fillna(median)

        feature_columns = [c for c in ['bedrooms', 'bathrooms', 'sqft', 'property_type_encoded', 'neighbourhood_encoded', 'city_encoded'] if c in df.columns]
        X = df[feature_columns]
        y = df['price_per_sqft']

        y_pred = model.predict(X)
        mape = mean_absolute_percentage_error(y, y_pred) * 100
        print(f'Model Validation MAPE: {mape:.2f}%  (n={len(y)})')

        if mape < 10:
            print('✅ Model performance is excellent (MAPE < 10%)')
        elif mape < 15:
            print('✅ Model performance is good (MAPE < 15%)')
        else:
            print('⚠️ Model performance needs improvement (MAPE >= 15%)')
            sys.exit(1)
        "
        
    - name: Commit and push trained model
      if: success()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add valuation_model.pkl valuation_model_encoders.pkl
        git diff --cached --quiet && echo "No model changes to commit" || \
          git commit -m "chore: update trained valuation model [skip ci]"
        git push origin main
        
    - name: Send retraining notification
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🤖 416Homes Model Retraining Completed"
        to: ${{ secrets.AGENT_EMAIL }}
        from: "416Homes Bot <noreply@416homes.ca>"
        body: |
          The 416Homes valuation model has been successfully retrained.
          
          Time: Workflow run time
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          
          Model performance metrics and validation results are available in the workflow logs.
          
          View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          This is an automated notification from the 416Homes ML system.
        
    - name: Send failure notification
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚨 416Homes Model Retraining Failed"
        to: ${{ secrets.AGENT_EMAIL }}
        from: "416Homes Bot <noreply@416homes.ca>"
        body: |
          The 416Homes model retraining has failed.
          
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          Time: Workflow run time
          Repository: ${{ github.repository }}
          
          Please check the GitHub Actions logs for details:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          This is an automated alert from the 416Homes ML system.
        
    - name: Create issue on critical failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const issue = {
            title: '🚨 Critical Model Retraining Failure',
            body: `
              ## 416Homes Model Retraining Critical Failure
              
              **Workflow**: ${{ github.workflow }}
              **Run ID**: ${{ github.run_id }}
              **Time**: ${{ github.event.head_commit.timestamp }}
              **Repository**: ${{ github.repository }}
              
              ### What Happened
              The weekly model retraining workflow has encountered a critical failure.
              
              ### Immediate Actions Required
              1. Review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              2. Check data availability and quality
              3. Verify model training pipeline
              4. Validate model performance metrics
              5. Check deployment process
              
              ### Investigation Checklist
              - [ ] Review error logs
              - [ ] Check data pipeline integrity
              - [ ] Verify model convergence
              - [ ] Check validation metrics
              - [ ] Test model predictions manually
              
              This issue was automatically created due to a critical failure in the ML pipeline.
            `,
            labels: ['bug', 'critical', 'ml', 'model-failure']
          };
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ...issue
          });
        github-token: ${{ secrets.GITHUB_TOKEN }}
