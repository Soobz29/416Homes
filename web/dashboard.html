<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>416Homes Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Disable Tailwind's "preflight" CSS reset.
        // WHY: Tailwind's preflight resets browser defaults, but it also sets
        // some elements (select, option, inputs) back to white backgrounds.
        // Since we have our own CSS variables and dark theme, preflight fights
        // us. Disabling it means we keep full control of base styles ourselves.
        tailwind.config = { corePlugins: { preflight: false } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a08;
            --white: #f5f4ef;
            --gold: #c8a96e;
            --gold-light: #e4c98a;
            --grey: #6b6b60;
            --green: #2ed573;
            --red: #c0392b;
            --border: rgba(200,169,110,0.2);
            --card-bg: rgba(255,255,255,0.025);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { 
            background:var(--black); 
            color:var(--white); 
            font-family:'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            overflow-x:hidden; 
            min-height:100vh;
        }
        
        body::before {
            content:''; 
            position:fixed; 
            inset:0; 
            pointer-events:none; 
            z-index:1000; 
            opacity:0.35;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        }
        
        /* High contrast for text */
        .text-primary { color: var(--white); }
        .text-secondary { color: var(--gold); }
        .text-muted { color: var(--grey); }
        
        /* Better contrast for inputs */
        input, select, textarea { 
            background:rgba(10,10,8,0.8); 
            border:1px solid var(--gold); 
            color:var(--white); 
            padding:0.7rem 0.9rem; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.82rem; 
            outline:none; 
            transition:border-color 0.2s; 
        }
        input:focus, select:focus, textarea:focus { 
            border-color:var(--gold); 
            box-shadow: 0 0 0 2px rgba(200,169,110,0.3);
        }
        input::placeholder, textarea::placeholder { 
            color:rgba(245,244,239,0.7); 
        }
        /* Force dark background on native select dropdowns.
           Without this, browser-rendered option dropdowns appear white
           even though the select element itself is dark. */
        select option {
            background: #0a0a08;
            color: #f5f4ef;
        }
        
        /* Tab content visibility is handled by React conditional rendering,
           not CSS class toggling. Removing display:none prevents the content
           from being permanently hidden when React renders it. */
        .tab-content { display: block; }
        .listing-card { 
            transition: all 0.3s ease; 
            background:var(--card-bg);
            border:1px solid var(--border);
            backdrop-filter:blur(8px);
        }
        .listing-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-color:rgba(200,169,110,0.4);
        }
        .loading-spinner { 
            border: 3px solid var(--border); 
            border-top: 3px solid var(--gold); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        /* NAV */
        nav { 
            position:fixed; 
            top:0; 
            left:0; 
            right:0; 
            z-index:100; 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:1.5rem 4rem; 
            border-bottom:1px solid var(--border); 
            backdrop-filter:blur(12px); 
            background:rgba(10,10,8,0.75); 
        }
        .logo { 
            font-size:1.3rem; 
            font-weight:800; 
            letter-spacing:0.05em; 
        }
        .logo span { 
            color:var(--gold); 
        }
        .logo sub { 
            font-size:0.6rem; 
            color:var(--grey); 
            vertical-align:middle; 
            letter-spacing:0.1em; 
            margin-left:0.3rem; 
            font-weight:400; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
        }
        .nav-links { 
            display:flex; 
            gap:2.5rem; 
            list-style:none; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.72rem; 
            letter-spacing:0.1em; 
            text-transform:uppercase; 
            color:var(--grey); 
        }
        .nav-links a { 
            color:inherit; 
            text-decoration:none; 
            transition:color 0.2s; 
        }
        .nav-links a:hover { 
            color:var(--gold); 
        }
        .nav-cta { 
            background:var(--gold); 
            color:var(--black); 
            border:none; 
            padding:0.65rem 1.5rem; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.72rem; 
            font-weight:500; 
            letter-spacing:0.08em; 
            text-transform:uppercase; 
            cursor:pointer; 
            transition:background 0.2s; 
        }
        .nav-cta:hover { 
            background:var(--gold-light); 
        }
        
        /* TAB NAV */
        .tab-nav { 
            background:rgba(10,10,8,0.8); 
            border-bottom:1px solid var(--border); 
            backdrop-filter:blur(12px);
            position:sticky;
            top:0;
            z-index:99;
        }
        .tab-nav-inner { 
            display:flex; 
            justify-content:center; 
            padding:0 4rem;
        }
        .tab-btn { 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.68rem; 
            letter-spacing:0.1em; 
            text-transform:uppercase; 
            color:var(--grey); 
            border:none; 
            background:none; 
            padding:1.25rem 1.5rem; 
            cursor:pointer; 
            transition:all 0.2s; 
            border-bottom:2px solid transparent;
        }
        .tab-btn:hover { 
            color:var(--gold); 
        }
        .tab-btn.active { 
            color:var(--gold); 
            border-bottom-color:var(--gold); 
        }

        /* DASHBOARD HERO */
        .dashboard-hero {
            padding:6rem 4rem 3rem;
            border-bottom:1px solid var(--border);
            background:radial-gradient(circle at top, rgba(200,169,110,0.14), transparent 55%);
        }
        .dashboard-hero-grid {
            max-width:1120px;
            margin:0 auto;
            display:grid;
            grid-template-columns:2fr 1.2fr;
            gap:2.5rem;
            align-items:center;
        }
        .dashboard-hero-eyebrow {
            font-family:'DM Mono','Courier New',Courier,monospace;
            font-size:0.7rem;
            letter-spacing:0.18em;
            text-transform:uppercase;
            color:var(--grey);
            margin-bottom:0.75rem;
        }
        .dashboard-hero-title {
            font-size:clamp(2.0rem,3vw,2.8rem);
            font-weight:800;
            letter-spacing:-0.02em;
            margin-bottom:0.75rem;
        }
        .dashboard-hero-title span {
            color:var(--gold);
        }
        .dashboard-hero-sub {
            font-family:'DM Mono','Courier New',Courier,monospace;
            font-size:0.8rem;
            color:var(--grey);
            max-width:34rem;
            line-height:1.7;
        }
        .dashboard-hero-ctas {
            display:flex;
            flex-wrap:wrap;
            gap:0.75rem;
            margin-top:1.75rem;
        }
        .dashboard-hero-cta-primary,
        .dashboard-hero-cta-secondary {
            border:none;
            cursor:pointer;
            font-family:'DM Mono','Courier New',Courier,monospace;
            font-size:0.72rem;
            letter-spacing:0.12em;
            text-transform:uppercase;
            padding:0.8rem 1.6rem;
            border-radius:999px;
        }
        .dashboard-hero-cta-primary {
            background:var(--gold);
            color:var(--black);
        }
        .dashboard-hero-cta-primary:hover {
            background:var(--gold-light);
        }
        .dashboard-hero-cta-secondary {
            background:transparent;
            color:var(--white);
            border:1px solid var(--border);
        }
        .dashboard-hero-cta-secondary:hover {
            border-color:var(--gold);
            color:var(--gold);
        }
        .dashboard-hero-metrics {
            display:grid;
            grid-template-columns:repeat(2,minmax(0,1fr));
            gap:0.75rem;
        }
        .dashboard-hero-metric {
            border-radius:14px;
            background:rgba(255,255,255,0.02);
            border:1px solid var(--border);
            padding:0.9rem 1rem;
        }
        .dashboard-hero-metric-label {
            font-family:'DM Mono','Courier New',Courier,monospace;
            font-size:0.62rem;
            text-transform:uppercase;
            letter-spacing:0.11em;
            color:var(--grey);
            margin-bottom:0.25rem;
        }
        .dashboard-hero-metric-value {
            font-size:1.35rem;
            font-weight:700;
            color:var(--gold);
        }
        
        /* FORM ELEMENTS */
        input, select, textarea { 
            background:rgba(255,255,255,0.04); 
            border:1px solid var(--border); 
            color:var(--white); 
            padding:0.7rem 0.9rem; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.82rem; 
            outline:none; 
            transition:border-color 0.2s; 
        }
        input:focus, select:focus, textarea:focus { 
            border-color:var(--gold); 
        }
        input::placeholder, textarea::placeholder { 
            color:var(--grey); 
        }
        .form-label { 
            display:block; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.62rem; 
            letter-spacing:0.13em; 
            text-transform:uppercase; 
            color:var(--grey); 
            margin-bottom:0.4rem; 
        }
        
        /* BUTTONS */
        .btn { 
            background:var(--gold); 
            color:var(--black); 
            border:none; 
            padding:0.9rem 2rem; 
            font-family:'Syne',sans-serif; 
            font-size:0.88rem; 
            font-weight:700; 
            letter-spacing:0.05em; 
            text-transform:uppercase; 
            cursor:pointer; 
            transition:all 0.2s; 
        }
        .btn:hover { 
            background:var(--gold-light); 
            transform:translateY(-1px); 
        }
        .btn-secondary { 
            background:transparent; 
            color:var(--white); 
            border:1px solid var(--border); 
            padding:0.9rem 1.8rem; 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.72rem; 
            letter-spacing:0.08em; 
            text-transform:uppercase; 
            cursor:pointer; 
            transition:all 0.2s; 
        }
        .btn-secondary:hover { 
            border-color:var(--gold); 
            color:var(--gold); 
        }
        .btn:disabled { 
            opacity:0.5; 
            cursor:not-allowed; 
        }
        
        /* CARDS */
        .card { 
            border:1px solid var(--border); 
            background:var(--card-bg); 
            backdrop-filter:blur(8px); 
            padding:2rem; 
        }
        
        /* STATS */
        .stat-item { 
            text-align:center; 
            padding:1.25rem 0; 
        }
        .stat-value { 
            font-size:1.05rem; 
            font-weight:700; 
            color:var(--white);
        }
        .stat-label { 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.58rem; 
            color:var(--grey); 
            text-transform:uppercase; 
            letter-spacing:0.08em; 
            margin-top:0.2rem; 
        }
        
        /* SUCCESS STATES */
        .success-box { 
            background:rgba(46,213,115,0.12); 
            border:1px solid rgba(46,213,115,0.2); 
            padding:1rem; 
            border-radius:4px;
        }
        .success-title { 
            color:var(--green); 
            font-size:1rem; 
            font-weight:700; 
            margin-bottom:0.5rem;
        }
        .success-text { 
            color:var(--green); 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.72rem;
        }
        
        /* FOOTER */
        footer { 
            border-top:1px solid var(--border); 
            padding:2.5rem 4rem; 
            background:rgba(10,10,8,0.8);
        }
        .footer-logo { 
            font-size:1.1rem; 
            font-weight:800; 
        }
        .footer-logo span { 
            color:var(--gold); 
        }
        .footer-copy { 
            font-family:'DM Mono', 'Courier New', Courier, monospace; 
            font-size:0.62rem; 
            color:var(--grey); 
        }
        
        @media(max-width:900px){
            nav{padding:1.25rem 1.5rem} 
            .nav-links{display:none}
            .tab-nav-inner{padding:0 1.5rem}
            .dashboard-hero{padding:5rem 1.5rem 2.5rem}
            .dashboard-hero-grid{grid-template-columns:1fr;gap:1.75rem}
            footer{flex-direction:column;gap:0.75rem;text-align:center}
        }
    </style>
</head>
<script src="/auth.js"></script>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Base URL
        const API_BASE = window.location.origin + '/api';

        // Main Dashboard Component
        function Dashboard() {
            const PAGE_SIZE = 20;
            const [activeTab, setActiveTab] = useState('listings');
            const [listings, setListings] = useState([]);
            const [offset, setOffset] = useState(0);
            const [hasMore, setHasMore] = useState(true);
            const [loadingMore, setLoadingMore] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [filters, setFilters] = useState({
                city: 'GTA',
                minPrice: '',
                maxPrice: '',
                bedrooms: '',
                bathrooms: ''
            });

            // Reset and reload when tab or filters change
            useEffect(() => {
                if (activeTab === 'listings') {
                    setOffset(0);
                    setListings([]);
                    setHasMore(true);
                    fetchListings(0, true);
                }
            }, [activeTab, filters]);

            const _buildParams = (off) => {
                const params = new URLSearchParams({ limit: String(PAGE_SIZE), offset: String(off) });
                if (filters.city && filters.city !== 'GTA') params.append('city', filters.city);
                if (filters.minPrice) params.append('min_price', filters.minPrice);
                if (filters.maxPrice) params.append('max_price', filters.maxPrice);
                if (filters.bedrooms) params.append('bedrooms', filters.bedrooms);
                if (filters.bathrooms) params.append('bathrooms', filters.bathrooms);
                return params;
            };

            const fetchListings = async (off = 0, replace = false) => {
                if (replace) setLoading(true); else setLoadingMore(true);
                if (replace) setError(null);
                try {
                    const params = _buildParams(off);
                    const response = await fetch(`${API_BASE}/listings?${params}`, {
                        headers: (window.Auth ? window.Auth.headers({'Content-Type': undefined}) : {})
                    });
                    if (!response.ok) throw new Error(`API error ${response.status}`);
                    const data = await response.json();
                    if (!Array.isArray(data)) throw new Error('Unexpected API response');
                    setListings(prev => replace ? data : [...prev, ...data]);
                    setOffset(off + data.length);
                    setHasMore(data.length === PAGE_SIZE);
                } catch (error) {
                    console.error('Error fetching listings:', error);
                    if (replace) { setError('Could not load listings. Please try again later.'); setListings([]); }
                } finally {
                    if (replace) setLoading(false); else setLoadingMore(false);
                }
            };

            const loadMore = () => fetchListings(offset, false);

            const formatSqft = (value) => {
                if (value == null) return '—';
                if (typeof value === 'number') return value.toLocaleString();
                const digits = String(value).replace(/[^\d]/g, '');
                if (!digits) return '—';
                const n = Number(digits);
                if (!n) return '—';
                return n.toLocaleString();
            };

            const ListingCard = ({ listing }) => {
                const sqft = formatSqft(listing.area);
                const source = (listing.source || '').toUpperCase();

                return (
                    <div className="listing-card card p-6">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h3
                                    style={{
                                        fontSize: '0.9rem',
                                        fontWeight: 600,
                                        marginBottom: '0.25rem',
                                        lineHeight: 1.4,
                                    }}
                                >
                                    {listing.address}
                                </h3>
                                <p
                                    style={{
                                        color: 'var(--gold)',
                                        fontSize: '1.6rem',
                                        fontWeight: 800,
                                        letterSpacing: '0.03em',
                                    }}
                                >
                                    ${listing.price.toLocaleString()}
                                </p>
                            </div>
                            <span
                                style={{
                                    fontFamily: "'DM Mono', monospace",
                                    fontSize: '0.58rem',
                                    letterSpacing: '0.12em',
                                    textTransform: 'uppercase',
                                    color: 'var(--gold)',
                                    border: '1px solid rgba(200,169,110,0.35)',
                                    padding: '0.18rem 0.55rem',
                                    display: 'inline-block',
                                }}
                            >
                                {source}
                            </span>
                        </div>

                        <div className="grid grid-cols-3 gap-4 mb-4">
                            <div className="stat-item">
                                <div className="stat-value text-primary">{listing.bedrooms || '—'}</div>
                                <div className="stat-label text-muted">Beds</div>
                            </div>
                            <div className="stat-item">
                                <div className="stat-value text-primary">{listing.bathrooms || '—'}</div>
                                <div className="stat-label text-muted">Baths</div>
                            </div>
                            <div className="stat-item">
                                <div className="stat-value text-primary">{sqft}</div>
                                <div className="stat-label text-muted">Sq Ft</div>
                            </div>
                        </div>

                        <div className="flex justify-between items-center">
                            <a
                                href={(/^https?:\/\//i.test(listing.url || '')) ? listing.url : '#'}
                                target="_blank"
                                rel="noopener noreferrer"
                                style={{
                                    color: 'var(--white)',
                                    textDecoration: 'none',
                                    fontSize: '0.78rem',
                                    fontFamily: "'DM Mono', monospace",
                                    letterSpacing: '0.08em',
                                    textTransform: 'uppercase',
                                }}
                            >
                                View Listing →
                            </a>
                            <button
                                onClick={() => setActiveTab('valuation')}
                                className="btn"
                                style={{
                                    padding: '0.65rem 1.4rem',
                                    fontSize: '0.8rem',
                                    fontFamily: "'Syne', sans-serif",
                                    fontWeight: 700,
                                    letterSpacing: '0.08em',
                                    textTransform: 'uppercase',
                                }}
                            >
                                Valuate
                            </button>
                        </div>
                    </div>
                );
            };

            const ListingsTab = ({ filters }) => (
                <div>
                    {/* Filters */}
                    <div className="card p-6 mb-6">
                        <h2 className="text-xl font-semibold mb-4 text-primary" style={{fontSize: '1.1rem', fontWeight: '700', marginBottom: '0.4rem'}}>Search Filters</h2>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                            <select 
                                value={filters.city}
                                onChange={(e) => setFilters({...filters, city: e.target.value})}
                                className="fi"
                            >
                                <option value="GTA">All GTA</option>
                                <option value="Toronto">Toronto</option>
                                <option value="Downtown">Downtown</option>
                                <option value="North York">North York</option>
                                <option value="Scarborough">Scarborough</option>
                                <option value="Etobicoke">Etobicoke</option>
                                <option value="Mississauga">Mississauga</option>
                                <option value="Brampton">Brampton</option>
                                <option value="Vaughan">Vaughan</option>
                                <option value="Markham">Markham</option>
                                <option value="Richmond Hill">Richmond Hill</option>
                                <option value="Oakville">Oakville</option>
                                <option value="Burlington">Burlington</option>
                                <option value="Ajax">Ajax</option>
                                <option value="Pickering">Pickering</option>
                                <option value="Whitby">Whitby</option>
                                <option value="Oshawa">Oshawa</option>
                                <option value="Milton">Milton</option>
                            </select>
                            
                            <input
                                type="number"
                                placeholder="Min Price"
                                value={filters.minPrice}
                                onChange={(e) => setFilters({...filters, minPrice: e.target.value})}
                                className="fi"
                            />
                            
                            <input
                                type="number"
                                placeholder="Max Price"
                                value={filters.maxPrice}
                                onChange={(e) => setFilters({...filters, maxPrice: e.target.value})}
                                className="fi"
                            />
                            
                            <select
                                value={filters.bedrooms}
                                onChange={(e) => setFilters({...filters, bedrooms: e.target.value})}
                                className="fi"
                            >
                                <option value="">Any Beds</option>
                                <option value="1">1+ Beds</option>
                                <option value="2">2+ Beds</option>
                                <option value="3">3+ Beds</option>
                                <option value="4">4+ Beds</option>
                            </select>
                            
                            <select
                                value={filters.bathrooms}
                                onChange={(e) => setFilters({...filters, bathrooms: e.target.value})}
                                className="fi"
                            >
                                <option value="">Any Baths</option>
                                <option value="1">1+ Baths</option>
                                <option value="2">2+ Baths</option>
                                <option value="3">3+ Baths</option>
                            </select>
                            
                            <button
                                onClick={fetchListings}
                                className="btn"
                                style={{width: '100%', padding: '0.9rem', fontSize: '0.88rem', fontFamily: "'Syne', sans-serif", fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase'}}
                            >
                                <i className="fas fa-search mr-2"></i>Search
                            </button>
                        </div>
                    </div>

                    {/* Listings Grid */}
                    {error && (
                        <div style={{background:'rgba(192,57,43,0.12)',border:'1px solid rgba(192,57,43,0.4)',borderRadius:'8px',padding:'1rem',marginBottom:'1rem',color:'#e74c3c',fontFamily:"'DM Mono',monospace",fontSize:'0.78rem'}}>
                            ⚠ {error}
                        </div>
                    )}
                    {loading ? (
                        <div className="flex justify-center items-center h-64">
                            <div className="loading-spinner"></div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {listings.map(listing => (
                                <ListingCard key={listing.id} listing={listing} />
                            ))}
                            {!loading && !error && listings.length === 0 && (
                                <div style={{gridColumn:'1/-1',textAlign:'center',color:'var(--text-muted)',padding:'3rem',fontFamily:"'DM Mono',monospace",fontSize:'0.78rem'}}>
                                    No listings found. Try adjusting your filters or run a scan.
                                </div>
                            )}
                        </div>
                    )}
                    {/* Load More */}
                    {!loading && !error && hasMore && listings.length > 0 && (
                        <div style={{textAlign:'center',marginTop:'2rem'}}>
                            <button
                                onClick={loadMore}
                                disabled={loadingMore}
                                className="btn"
                                style={{padding:'0.75rem 2.5rem',fontSize:'0.82rem',letterSpacing:'0.08em',textTransform:'uppercase',opacity: loadingMore ? 0.6 : 1}}
                            >
                                {loadingMore ? 'Loading...' : 'Load More'}
                            </button>
                        </div>
                    )}
                </div>
            );

            const ValuationTab = () => {
                const [valuationData, setValuationData] = useState({
                    neighbourhood: '',
                    property_type: 'Condo Apt',
                    city: 'Toronto',
                    bedrooms: '',
                    bathrooms: '',
                    sqft: '',
                    list_price: ''
                });
                const [valuationResult, setValuationResult] = useState(null);
                const [loading, setLoading] = useState(false);

                const handleValuation = async () => {
                    setLoading(true);
                    try {
                        const payload = {
                            ...valuationData,
                            bedrooms: parseInt(valuationData.bedrooms || '0', 10),
                            bathrooms: parseInt(valuationData.bathrooms || '0', 10),
                            sqft: parseInt(valuationData.sqft || '0', 10),
                            list_price: parseInt(valuationData.list_price || '0', 10),
                        };

                        const response = await fetch(`${API_BASE}/valuate`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const result = await response.json();
                        setValuationResult(result);
                    } catch (error) {
                        console.error('Valuation error:', error);
                        setValuationResult({ error: 'Could not reach valuation service. Please try again.' });
                    } finally {
                        setLoading(false);
                    }
                };

                return (
                    <div style={{maxWidth: '60rem', margin: '0 auto'}}>
                        <div className="card p-6">
                            <h2 className="text-2xl font-semibold mb-6 text-primary" style={{fontSize: 'clamp(1.6rem,2.5vw,2.8rem)', fontWeight: '800', letterSpacing: '-0.02em', marginBottom: '3rem'}}>Property Valuation</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                <input
                                    type="text"
                                    placeholder="Neighbourhood"
                                    value={valuationData.neighbourhood}
                                    onChange={(e) => setValuationData({...valuationData, neighbourhood: e.target.value})}
                                    className="fi"
                                />
                                
                                <select
                                    value={valuationData.property_type}
                                    onChange={(e) => setValuationData({...valuationData, property_type: e.target.value})}
                                    className="fi"
                                >
                                    <option value="Condo Apt">Condo Apartment</option>
                                    <option value="Detached">Detached House</option>
                                    <option value="Semi-Detached">Semi-Detached</option>
                                    <option value="Townhouse">Townhouse</option>
                                </select>
                                
                                <select
                                    value={valuationData.city}
                                    onChange={(e) => setValuationData({...valuationData, city: e.target.value})}
                                    className="fi"
                                >
                                    <option value="Toronto">Toronto</option>
                                    <option value="Mississauga">Mississauga</option>
                                </select>
                                
                                <input
                                    type="number"
                                    placeholder="Bedrooms"
                                    value={valuationData.bedrooms}
                                    onChange={(e) => setValuationData({...valuationData, bedrooms: e.target.value})}
                                    className="fi"
                                />
                                
                                <input
                                    type="number"
                                    placeholder="Bathrooms"
                                    value={valuationData.bathrooms}
                                    onChange={(e) => setValuationData({...valuationData, bathrooms: e.target.value})}
                                    className="fi"
                                />
                                
                                <input
                                    type="number"
                                    placeholder="Square Feet"
                                    value={valuationData.sqft}
                                    onChange={(e) => setValuationData({...valuationData, sqft: e.target.value})}
                                    className="fi"
                                />
                                
                                <input
                                    type="number"
                                    placeholder="List Price"
                                    value={valuationData.list_price}
                                    onChange={(e) => setValuationData({...valuationData, list_price: e.target.value})}
                                    className="fi"
                                    style={{gridColumn: '1 / -1'}}
                                />
                            </div>
                            
                            <button
                                onClick={handleValuation}
                                disabled={loading}
                                className="btn"
                                style={{width: '100%', padding: '0.9rem', fontSize: '0.88rem', fontFamily: "'Syne', sans-serif", fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase'}}
                            >
                                {loading ? 'Analyzing...' : 'Get Valuation'}
                            </button>
                            
                            {valuationResult && (
                                <div className="success-box mt-6">
                                    <h3 className="success-title">
                                        Estimated Value:&nbsp;
                                        ${valuationResult.estimated_value?.toLocaleString()}
                                    </h3>
                                    <p className="success-text">
                                        Confidence: {(valuationResult.confidence * 100).toFixed(1)}%
                                    </p>
                                    <p className="success-text" style={{marginTop: '0.5rem'}}>
                                        {valuationResult.market_analysis}
                                    </p>

                                    {valuationResult.comparable_sales && valuationResult.comparable_sales.length > 0 && (
                                        <div style={{marginTop: '1.25rem'}}>
                                            <p className="success-text" style={{marginBottom: '0.5rem', fontWeight: '600'}}>
                                                Recent Comparable Sales
                                            </p>
                                            <div style={{borderTop:'1px solid rgba(200,169,110,0.3)'}}>
                                                {valuationResult.comparable_sales.slice(0,3).map((comp, idx) => (
                                                    <div key={idx} style={{display:'flex',justifyContent:'space-between',padding:'0.45rem 0',borderBottom:'1px solid rgba(200,169,110,0.14)'}}>
                                                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.68rem',color:'var(--white)'}}>
                                                            {comp.address}
                                                        </span>
                                                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'0.68rem',color:'var(--grey)'}}>
                                                            ${comp.sold_price?.toLocaleString?.() || comp.sold_price}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const VideosTab = () => {
                return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'4rem',textAlign:'center'}}>
        <p style={{fontFamily:"'DM Mono',monospace",fontSize:'0.72rem',color:'var(--grey)',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'1.5rem'}}>Professional listing videos for GTA agents</p>
        <h2 style={{fontSize:'clamp(1.6rem,2.5vw,2.8rem)',fontWeight:'800',color:'var(--white)',marginBottom:'1rem'}}>
            Turn any listing into a <span style={{color:'var(--gold)'}}>cinematic video</span>
        </h2>
        <p style={{color:'var(--grey)',fontFamily:"'DM Mono',monospace",fontSize:'0.8rem',marginBottom:'2.5rem',maxWidth:'40rem'}}>
            Paste a Realtor.ca or Zillow URL. AI writes script, records voiceover, adds music — delivers a polished 30-second video in under 15 minutes.
        </p>
        <a href="/video" className="btn" style={{padding:'1rem 3rem',fontSize:'0.9rem',fontFamily:"'Syne',sans-serif",fontWeight:'700',letterSpacing:'0.08em',textTransform:'uppercase',textDecoration:'none'}}>
            Order a Video →
        </a>
    </div>
);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav>
                        <div className="logo"><span>416</span>Homes<sub>DASHBOARD</sub></div>
                        <ul className="nav-links">
                            <li><button onClick={() => setActiveTab('listings')} style={{background:'none',border:'none',cursor:'pointer',color:'inherit',fontFamily:'inherit',fontSize:'inherit',letterSpacing:'inherit',padding:0,textDecoration:'none'}}>Properties</button></li>
                            <li><button onClick={() => setActiveTab('valuation')} style={{background:'none',border:'none',cursor:'pointer',color:'inherit',fontFamily:'inherit',fontSize:'inherit',letterSpacing:'inherit',padding:0,textDecoration:'none'}}>Valuation</button></li>
                            <li><button onClick={() => setActiveTab('videos')} style={{background:'none',border:'none',cursor:'pointer',color:'inherit',fontFamily:'inherit',fontSize:'inherit',letterSpacing:'inherit',padding:0,textDecoration:'none'}}>Videos</button></li>
                        </ul>
                        <button className="nav-cta" onClick={() => window.open('416homes.html', '_blank')}>
                            <i className="fas fa-home mr-2"></i>Back to 416Homes
                        </button>
                    </nav>

                    {/* Hero */}
                    <section className="dashboard-hero">
                        <div className="dashboard-hero-grid">
                            <div>
                                <p className="dashboard-hero-eyebrow">Toronto · Mississauga · GTA</p>
                                <h1 className="dashboard-hero-title">
                                    Your <span>always‑on</span> real estate dashboard.
                                </h1>
                                <p className="dashboard-hero-sub">
                                    Track new listings, run valuations, and order cinematic videos from a single
                                    control panel powered by the 416Homes autonomous agent.
                                </p>
                                <div className="dashboard-hero-ctas">
                                    <button
                                        className="dashboard-hero-cta-primary"
                                        onClick={() => setActiveTab('listings')}
                                    >
                                        View properties
                                    </button>
                                    <button
                                        className="dashboard-hero-cta-secondary"
                                        onClick={() => setActiveTab('valuation')}
                                    >
                                        Run a valuation
                                    </button>
                                    <button
                                        className="dashboard-hero-cta-secondary"
                                        onClick={() => setActiveTab('videos')}
                                    >
                                        Order a video
                                    </button>
                                </div>
                            </div>
                            <div className="dashboard-hero-metrics">
                                <div className="dashboard-hero-metric">
                                    <div className="dashboard-hero-metric-label">Active listings</div>
                                    <div className="dashboard-hero-metric-value">GTA‑wide</div>
                                    <p className="text-muted" style={{fontSize:'0.72rem',marginTop:'0.25rem'}}>
                                        Pulled from Realtor.ca, Zoocasa, Kijiji and more.
                                    </p>
                                </div>
                                <div className="dashboard-hero-metric">
                                    <div className="dashboard-hero-metric-label">Scan cadence</div>
                                    <div className="dashboard-hero-metric-value">Every 30 min</div>
                                    <p className="text-muted" style={{fontSize:'0.72rem',marginTop:'0.25rem'}}>
                                        Nightly full scans plus on‑demand refreshes for hot listings.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Navigation Tabs */}
                    <div className="tab-nav">
                        <div className="tab-nav-inner">
                            <button
                                onClick={() => setActiveTab('listings')}
                                className={`tab-btn ${activeTab === 'listings' ? 'active' : ''}`}
                            >
                                <i className="fas fa-search mr-2"></i>Property Listings
                            </button>
                            <button
                                onClick={() => {
                                    console.log('Clicking valuation tab');
                                    setActiveTab('valuation');
                                }}
                                className={`tab-btn ${activeTab === 'valuation' ? 'active' : ''}`}
                            >
                                <i className="fas fa-chart-line mr-2"></i>Property Valuation
                            </button>
                            <button
                                onClick={() => {
                                    console.log('Clicking videos tab');
                                    setActiveTab('videos');
                                }}
                                className={`tab-btn ${activeTab === 'videos' ? 'active' : ''}`}
                            >
                                <i className="fas fa-video mr-2"></i>Property Videos
                            </button>
                        </div>
                    </div>

                    {/* Main Content — React renders only the active tab component */}
                    <main style={{padding: '4rem'}}>
                        <div className="tab-content">
                            {activeTab === 'listings' && <ListingsTab filters={filters} />}
                            {activeTab === 'valuation' && <ValuationTab />}
                            {activeTab === 'videos' && <VideosTab />}
                        </div>
                    </main>

                    {/* Footer */}
                    <footer>
                        <div className="footer-logo"><span>416</span>Homes Dashboard</div>
                        <div className="footer-copy">Toronto Real Estate Intelligence Platform</div>
                        <div className="footer-copy">© 2024 416Homes · Dashboard</div>
                    </footer>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
