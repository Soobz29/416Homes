[phases.setup]
nixPkgs = ["python312", "ffmpeg"]

# Install the slim API stack only. Root requirements.txt pulls ML/scraping (LightGBM,
# Playwright, etc.) and often fails or times out on Railway builds.
# Must recreate the Python provider venv + activate + pip (overriding [phases.install]
# replaces the default install phase entirely).
[phases.install]
paths = ["/opt/venv/bin"]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --no-cache-dir --retries 5 --timeout 60 -r requirements-railway.txt",
]
